name: Linux Build

on:
  push:
  pull_request:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Pack (bundle only)
        run: npm run pack

      - name: Build (draft, unsigned)
        run: npm run dist:draft

      - name: Build (published)
        if: "contains(github.event.head_commit.message, '[publish]')"
        run: npm run dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: electron-blink1-toy-${{ runner.os }}
          path: |
            release/*.zip
            release/*.AppImage
            release/*.snap
